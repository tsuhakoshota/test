<html lang="ja">
  <head>
    <script src="https://rawgit.com/nicolocarpignoli/nicolocarpignoli.github.io/master/ar-click-events/events.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.rawgit.com/mayognaise/aframe-chromakey-material/v1.2.0/dist/aframe-chromakey-material.min.js"></script>
    <script>
      // Attendre que le DOM soit prêt
      document.addEventListener("DOMContentLoaded", function () {
        // Ajouter un écouteur d'événement pour targetFound
        document
          .querySelector("a-entity[mindar-image-target]")
          .addEventListener("targetFound", function () {
            var video = document.querySelector("#viddd");
            if (video) {
              // Jouer la vidéo
              video.play();
            }
          });
      });
    </script>
    <script>
      // Attendre que le DOM soit prêt
      document.addEventListener("DOMContentLoaded", function () {
        // Ajouter un écouteur d'événement pour targetFound
        document
          .querySelector("a-entity[mindar-image-target]")
          .addEventListener("targetFound", function () {
            var video = document.querySelector("#insta");
            if (video) {
              // Jouer la vidéo
              video.play();
            }
          });
      });
    </script>
    <script>
      // Attendre que le DOM soit prêt
      document.addEventListener("DOMContentLoaded", function () {
        // Ajouter un écouteur d'événement pour targetFound
        document
          .querySelector("a-entity[mindar-image-target]")
          .addEventListener("targetFound", function () {
            var video = document.querySelector("#insta");
            if (video) {
              // Jouer la vidéo
              video.play();
            }
          });
      });
    </script>
  </head>
  <body>
    <!-- le fichier .mind est la cible -->
    <a-scene
      mindar-image="imageTargetSrc: https://cdn.glitch.global/6f41f115-b3f0-4265-9cbe-0e732292bfbd/neko.mind?v=1747187305389;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: true"
    >
      <a-assets>
        <!-- changer ici le lien de la vidéo -->
        <video
          id="viddd"
          src="https://cdn.glitch.global/6f41f115-b3f0-4265-9cbe-0e732292bfbd/lr.mp4?v=1747038318321"
          autoplay="true"
          loop="false"
          playsline
        ></video>
      </a-assets>

      <a-camera
        position="0 0 0"
        look-controls="enabled: false"
        cursor="fuse: false; rayOrigin: mouse;"
        raycaster="far: ${customFields.libVersion}; objects: .clickable"
      ></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video
          src="#viddd"
          position="-1 0 0"
          rotation="0 0 0"
          height="3"
          width="1"
        ></a-video>
        <a-video
          id="insta"
          src="https://cdn.glitch.global/6f41f115-b3f0-4265-9cbe-0e732292bfbd/hjklogoinsta.png?v=1747185286103"
          position="0 -1 0"
          rotation="0 0 0"
          height="1"
          width="1"
          class="clickable"
          link="href: https://www.instagram.com/day.night.care?igsh=MWF6amN3Y25ka2xqZg%3D%3D&utm_source=qr"
        ></a-video>
        <a-plane
          id="lr"
          src="https://cdn.glitch.global/6f41f115-b3f0-4265-9cbe-0e732292bfbd/lrinstalogo.png?v=1747185303004"
          position="0 1 0"
          rotation="0 0 0"
          height="1"
          width="1"
          class="clickable"
          link="href: https://www.instagram.com/lirimaki213?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw=="
        ></a-plane>
      </a-entity>
    </a-scene>
  </body>
</html>
